<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Expedia Verified</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #eee; }
        .form-card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #003580; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #003580; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:hover { background: #00224f; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Book New Trip</h2>
        <label>Confirmation ID (e.g. #Z5N7W1)</label>
        <input type="text" id="flightId">
        
        <label>Customer Full Name</label>
        <input type="text" id="custName">
        
        <label>Full Flight Details (Times, Layover, Seats)</label>
        <textarea id="details" rows="5"></textarea>
        
        <label>Total Price (e.g. $1,450.00)</label>
        <input type="text" id="price">
        
        <label>Upload Airline Logo</label>
        <input type="file" id="logoFile" accept="image/*">
        
        <button id="submitBtn" onclick="processBooking()">SAVE & CONFIRM BOOKING</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKceQUoG7aYIhuxcfp-wNQociIetEHsXiEBDqw1D-XnFcCc9rUVfWcanOyTovQgs5d/exec";

        function processBooking() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const file = document.getElementById('logoFile').files[0];
            const reader = new FileReader();

            reader.onloadend = async function() {
                const payload = {
                    flightId: document.getElementById('flightId').value.toUpperCase(),
                    name: document.getElementById('custName').value,
                    details: document.getElementById('details').value,
                    price: document.getElementById('price').value,
                    logo: reader.result, // Base64 image data
                    date: new Date().toLocaleDateString()
                };

                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", // Required for Apps Script POST
                    body: JSON.stringify(payload)
                });

                alert("Trip Successfully Saved to Google Sheets!");
                location.reload();
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
