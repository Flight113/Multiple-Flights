<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Confirmed | Expedia Verified</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        .top-banner { background: #003580; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
        .top-banner span { color: #f97316; }
        .container { max-width: 750px; margin: 20px auto; background: white; padding: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 4px; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 2px solid #003580; padding-bottom: 20px; }
        .airline-logo { max-height: 60px; max-width: 200px; }
        .status-badge { background: #d4edda; color: #155724; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .section-header { background: #e9f0fa; color: #003580; padding: 10px; font-weight: bold; margin-top: 30px; border-left: 5px solid #003580; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .details-text { white-space: pre-line; line-height: 1.6; padding: 15px 0; font-size: 15px; }
        .price-summary { margin-top: 30px; background: #003580; color: white; padding: 20px; border-radius: 4px; text-align: right; }
        .price-summary h2 { margin: 0; font-size: 28px; }
    </style>
</head>
<body>
    <div class="top-banner">Expedia<span>Verified</span></div>
    <div class="container" id="main-content">
        <div class="header-row">
            <img id="airline-logo" class="airline-logo" src="" alt="Airline Logo">
            <div class="status-badge"><i class="fas fa-check-circle"></i> RESERVATION CONFIRMED</div>
        </div>

        <div class="section-header">PASSENGER INFORMATION</div>
        <div class="data-row">
            <span>Primary Traveler:</span>
            <strong id="cust-name">Loading...</strong>
        </div>

        <div class="section-header">FLIGHT ITINERARY</div>
        <div id="flight-details" class="details-text">Fetching flight data...</div>

        <div class="section-header">PAYMENT SUMMARY</div>
        <div class="price-summary">
            <p style="margin: 0; font-size: 14px; opacity: 0.9;">Total Price (Taxes Included)</p>
            <h2 id="total-price">$0.00</h2>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKceQUoG7aYIhuxcfp-wNQociIetEHsXiEBDqw1D-XnFcCc9rUVfWcanOyTovQgs5d/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const flightId = urlParams.get('id');

        async function fetchItinerary() {
            if (!flightId) return;
            try {
                const response = await fetch(`${SCRIPT_URL}?id=${flightId}`);
                const data = await response.json();
                
                document.getElementById('airline-logo').src = data.logo;
                document.getElementById('cust-name').innerText = data.name;
                document.getElementById('flight-details').innerText = data.details;
                document.getElementById('total-price').innerText = data.price;
            } catch (err) {
                console.error("Error loading itinerary:", err);
            }
        }
        fetchItinerary();
    </script>
</body>
</html>
